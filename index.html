<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Özgen Erbakan — Senior Software Engineer crafting reliable, scalable systems. Based in Ankara, Türkiye." />
  <title>Özgen Erbakan — Senior Software Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="nav nav--dark">
    <a href="index.html" class="nav__logo">
      <span class="nav__logo-dot"></span>
      özgen erbakan
    </a>
    <button class="nav__hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav__links">
      <a href="index.html" class="nav__link">Home</a>
      <a href="about.html" class="nav__link">About</a>
      <a href="experience.html" class="nav__link">Experience</a>
      <a href="contact.html" class="nav__link">Contact</a>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <section class="hero">
    <div class="hero__grid-bg"></div>
    <div class="hero__glow"></div>
    <div class="hero__content">
      <p class="hero__greeting" data-typewriter="// Hello, I'm"></p>
      <h1 class="hero__name">Özgen Erbakan</h1>
      <p class="hero__title">
        <span>Senior Software Engineer</span> &mdash; building reliable systems at scale,<br/>
        leading teams with clarity and purpose.
      </p>
      <div class="hero__actions">
        <a href="experience.html" class="btn btn--primary">
          View My Work
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
        <a href="contact.html" class="btn btn--ghost">Get in Touch</a>
      </div>
    </div>
    <!-- Stats inside hero -->
    <div class="hero__stats">
      <div class="hero__stat">
        <div class="hero__stat-number"><span data-count="13" data-suffix="+">0+</span></div>
        <div class="hero__stat-label">Years of Experience</div>
      </div>
      <div class="hero__stat">
        <div class="hero__stat-number"><span data-count="4" data-suffix="+">0+</span></div>
        <div class="hero__stat-label">Companies</div>
      </div>
      <div class="hero__stat">
        <div class="hero__stat-number"><span data-count="5" data-suffix="+">0+</span></div>
        <div class="hero__stat-label">Products Shipped</div>
      </div>
      <div class="hero__stat">
        <div class="hero__stat-number"><span data-count="3" data-suffix="">0</span></div>
        <div class="hero__stat-label">Industries</div>
      </div>
    </div>
  </section>

  <script src="assets/js/main.js"></script>
